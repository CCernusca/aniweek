<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniWeek</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="brand">AniWeek</h1>
    <form id="user-form" class="user-form">
      <input type="text" id="username" name="username" placeholder="AniList username" autocomplete="off" required />
      <button type="submit">Load anime</button>
    </form>
  </header>

  <main>
    <div id="status" class="status" role="status" aria-live="polite"></div>

    <section id="week-table" class="week-table" hidden></section>

    <section id="not-airing" class="not-airing" hidden>
      <h2>Not airing this week</h2>
      <div id="not-airing-list" class="not-airing-list"></div>
    </section>
  </main>

  <footer class="app-footer">
    <p>Data from <a href="https://anilist.co" target="_blank" rel="noopener">AniList</a>. Not affiliated with AniList.</p>
  </footer>

  <div id="modal-overlay" class="modal-overlay" hidden>
    <div id="modal" class="modal" role="dialog" aria-modal="true">
      <img id="modal-cover" class="modal-cover" alt="" />
      <div class="modal-body">
        <h2 id="modal-title"></h2>
        <p id="modal-airing" class="modal-airing"></p>
        <p id="modal-description" class="modal-description"></p>
        <a id="modal-link" class="modal-link" target="_blank" rel="noopener">View on AniList</a>
      </div>
    </div>
  </div>

  <script src="js/anilist.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
